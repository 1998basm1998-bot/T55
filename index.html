<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحميل تيك توك</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Tahoma, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .box {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 28px;
    }

    p {
      text-align: center;
      color: #dbeafe;
      line-height: 1.8;
    }

    input {
      width: 100%;
      height: 52px;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 0 14px;
      margin-top: 15px;
      font-size: 15px;
    }

    button {
      width: 100%;
      height: 50px;
      margin-top: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #22c55e;
      color: #fff;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      line-height: 1.8;
      min-height: 48px;
    }

    .results {
      margin-top: 15px;
    }

    .item {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .item a {
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>تحميل فيديو تيك توك</h1>
    <p>الصق الرابط واضغط جلب روابط التحميل</p>

    <input id="url" type="url" placeholder="ضع رابط تيك توك هنا" />
    <button onclick="getLinks()">جلب روابط التحميل</button>

    <div class="status" id="status">جاهز</div>
    <div class="results" id="results"></div>
  </div>

  <script>
    async function getLinks() {
      const url = document.getElementById("url").value.trim();
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      results.innerHTML = "";

      if (!url) {
        status.textContent = "يرجى إدخال رابط أولاً";
        return;
      }

      status.textContent = "جاري المعالجة...";

      try {
        const response = await fetch("http://localhost:3000/api/tiktok-download", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!data.ok) {
          status.textContent = data.message || "فشل في جلب الروابط";
          return;
        }

        status.textContent = data.message || "تم بنجاح";

        if (data.links && data.links.length) {
          data.links.forEach((link, index) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div>الرابط ${index + 1}</div>
              <div><a href="${link.href}" target="_blank">${link.href}</a></div>
              <div>${link.text || ""}</div>
            `;
            results.appendChild(div);
          });
        } else {
          results.innerHTML = "<div class='item'>ماكو روابط ظاهرة</div>";
        }

      } catch (error) {
        status.textContent = "خطأ اتصال مع السيرفر";
      }
    }
  </script>
</body>
</html>
